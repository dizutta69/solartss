<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAGNOSTICO - SolarTSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-4 flex flex-col justify-center max-w-md mx-auto">
    
    <div class="bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700 space-y-6">
        <h1 class="text-xl font-bold text-center text-amber-400">⚠️ Panel de Diagnóstico Técnico ⚠️</h1>
        <p class="text-sm text-slate-400 text-center">Rellena este test rápido para forzar y capturar el error interno de Google.</p>
        
        <form id="diagForm" onsubmit="probarEnvio(event)" class="space-y-4">
            <div>
                <label class="block text-xs text-slate-400 mb-1">Nombre de Cliente de Prueba</label>
                <input type="text" id="test_cliente" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white" value="Test Diagnostico" required>
            </div>
            
            <div>
                <label class="block text-xs text-slate-400 mb-1">Simular Carga de Foto Corta</label>
                <select id="test_foto" class="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white">
                    <option value="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">Imagen de Prueba Liviana (1 pixel)</option>
                    <option value="">Sin imagen (Vacío)</option>
                </select>
            </div>

            <button type="submit" id="btnDiag" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold p-3 rounded-lg transition shadow-lg">
                ⚡ Lanzar Test de Conexión
            </button>
        </form>
    </div>

    <script>
const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbzU0-z7BY3wP1BUXZUS06JzL7gQ-ydpXmK-hZjWiXDQsrKZp8i7v6mv2HbepXTjHTBbqg/exec";

async function probarEnvio(event) {
    event.preventDefault();
    const btn = document.getElementById("btnDiag");
    btn.disabled = true;
    btn.innerText = "Conectando con Google...";

    const formData = new URLSearchParams();
    formData.append("id_visita", "diag_" + Math.random().toString(36).substring(2, 7));
    formData.append("tipo_instalacion", "Residencial");
    formData.append("cliente", document.getElementById("test_cliente").value);
    formData.append("direccion", "Calle Diagnostico 123");
    formData.append("gps", "4.0, -74.0");
    formData.append("tipo_cubierta", "Losa");
    formData.append("inclinacion", "15");
    formData.append("tipo_red", "Monofasica");
    formData.append("breaker_principal", "1x20A");
    
    // Mandamos el string base64 seleccionado
    const stringFoto = document.getElementById("test_foto").value;
    formData.append("foto_recibo", stringFoto);
    formData.append("foto_tablero", stringFoto);
    formData.append("foto_techo", stringFoto);

    try {
        // FORZAMOS MODO CORS PARA PODER LEER EL TEXTO DE ERROR
        const response = await fetch(URL_APPS_SCRIPT, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        });
        
        const textoRespuesta = await response.text();
        
        // Desplegar la respuesta cruda directamente en pantalla
        alert("--- RESPUESTA RECIBIDA DESDE GOOGLE ---\n\n" + textoRespuesta);
        console.log("Respuesta completa:", textoRespuesta);

    } catch (error) {
        alert("❌ ERROR CRÍTICO DE RED / CORS:\n\n" + error.message + "\n\nEsto suele pasar si el Apps Script no está publicado correctamente para 'Cualquiera' (Anyone) o si hay bloqueos de redirección.");
    } finally {
        btn.disabled = false;
        btn.innerText = "⚡ Lanzar Test de Conexión";
    }
}
    </script>
</body>
</html>
