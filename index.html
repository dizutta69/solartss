<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarTSS - Site Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-md flex flex-col">
        <header class="bg-blue-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow">
            <h1 class="font-bold text-lg">SolarTSS ☀️</h1>
            <span id="estado-guardado" class="text-xs bg-emerald-500 px-2 py-1 rounded text-white font-medium opacity-0 transition-opacity duration-300">Autoguardado</span>
        </header>
        
        <main class="p-4 flex-grow">
            <div id="loginSection" class="space-y-4 py-8">
                <h2 class="text-xl font-bold text-center text-blue-900">Acceso Técnico</h2>
                <input type="password" id="appPass" class="w-full border rounded p-3 text-center" placeholder="Introduce la contraseña técnica">
                <button onclick="verificarLogin()" class="w-full bg-blue-900 text-white font-bold p-3 rounded-lg">Entrar</button>
                <p id="loginError" class="text-red-500 text-sm text-center hidden">Contraseña incorrecta</p>
            </div>

            <form id="surveyForm" class="space-y-6 hidden" onsubmit="enviarFormulario(event)">
                <input type="hidden" id="id_visita" name="id_visita">

                <div>
                    <label class="block font-medium text-sm text-slate-700 mb-1">Tipo de Instalación</label>
                    <select id="tipo_instalacion" name="tipo_instalacion" class="w-full border rounded p-2 bg-slate-50 target-save">
                        <option value="Residencial">Residencial</option>
                        <option value="Comercial">Comercial</option>
                    </select>
                </div>

                <div class="bg-slate-50 p-3 rounded-lg border space-y-4">
                    <h3 class="font-bold text-sm text-blue-900 uppercase">Información del Cliente</h3>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Nombre Completo</label>
                        <input type="text" id="cliente" name="cliente" class="w-full border rounded p-2 target-save" placeholder="Nombre">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Dirección del Sitio</label>
                        <input type="text" id="direccion" name="direccion" class="w-full border rounded p-2 target-save" placeholder="Dirección">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Coordenadas GPS</label>
                        <div class="flex gap-2">
                            <input type="text" id="gps" name="gps" class="w-full border rounded p-2 target-save" placeholder="Lat, Lon">
                            <button type="button" onclick="obtenerUbicacion()" class="bg-blue-600 text-white px-3 rounded text-sm">📍 GPS</button>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-50 p-3 rounded-lg border space-y-4">
                    <h3 class="font-bold text-sm text-blue-900 uppercase">Infraestructura y Techo</h3>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Tipo de Cubierta</label>
                        <input type="text" id="tipo_cubierta" name="tipo_cubierta" class="w-full border rounded p-2 target-save" placeholder="Teja, losa...">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Inclinación (°)</label>
                        <input type="number" id="inclinacion" name="inclinacion" class="w-full border rounded p-2 target-save" placeholder="Inclinación">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Tipo de Red Eléctrica</label>
                        <select id="tipo_red" name="tipo_red" class="w-full border rounded p-2 target-save">
                            <option value="Monofasica">Monofásica</option>
                            <option value="Bifasica">Bifásica</option>
                            <option value="Trifasica">Trifásica</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Breaker Principal</label>
                        <input type="text" id="breaker_principal" name="breaker_principal" class="w-full border rounded p-2 target-save" placeholder="Ej. 3x40A">
                    </div>
                </div>

                <div class="bg-slate-50 p-3 rounded-lg border space-y-4">
                    <h3 class="font-bold text-sm text-blue-900 uppercase">Registro Fotográfico</h3>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Foto Recibo de Luz</label>
                        <input type="file" accept="image/*" capture="environment" onchange="procesarFoto('recibo', this)" class="w-full text-sm text-slate-500">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Foto Tablero Eléctrico</label>
                        <input type="file" accept="image/*" capture="environment" onchange="procesarFoto('tablero', this)" class="w-full text-sm text-slate-500">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Foto Área de Techo</label>
                        <input type="file" accept="image/*" capture="environment" onchange="procesarFoto('techo', this)" class="w-full text-sm text-slate-500">
                    </div>
                </div>

                <button type="submit" id="btnEnviar" class="w-full bg-emerald-600 text-white font-bold p-3 rounded-lg shadow text-center">
                    🚀 Finalizar y Enviar a Google
                </button>
            </form>
        </main>
    </div>

    <script>
// CONFIGURACIÓN DE URL DE ACCESO
const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbzU0-z7BY3wP1BUXZUS06JzL7gQ-ydpXmK-hZjWiXDQsrKZp8i7v6mv2HbepXTjHTBbqg/exec";
const PASS_CORRECTA = "ZuttaSolar2026*"; 

let fotosBase64 = { recibo: "", tablero: "", techo: "" };

function verificarLogin() {
    const pass = document.getElementById("appPass").value;
    if (pass === PASS_CORRECTA) {
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("surveyForm").classList.remove("hidden");
        inicializarFormulario();
    } else {
        document.getElementById("loginError").classList.remove("hidden");
    }
}

function inicializarFormulario() {
    if (!localStorage.getItem("id_visita")) {
        localStorage.setItem("id_visita", Math.random().toString(36).substring(2, 10));
    }
    document.getElementById("id_visita").value = localStorage.getItem("id_visita");
    
    // Cargar datos guardados previamente del LocalStorage
    document.querySelectorAll('.target-save').forEach(input => {
        const valorGuardado = localStorage.getItem(input.id);
        if (valorGuardado) input.value = valorGuardado;

        // Guardado incremental
        input.addEventListener('input', () => {
            localStorage.setItem(input.id, input.value);
            alertarAutoguardado();
        });
    });
}

function alertarAutoguardado() {
    const badge = document.getElementById("estado-guardado");
    badge.style.opacity = "1";
    setTimeout(() => badge.style.opacity = "0", 1000);
}

function obtenerUbicacion() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            const inputGps = document.getElementById("gps");
            inputGps.value = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            localStorage.setItem("gps", inputGps.value);
            alertarAutoguardado();
        });
    }
}

function procesarFoto(tipo, input) {
    if (input.files.length === 0) return;
    const file = input.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            if (width > 1200) { height *= 1200 / width; width = 1200; }
            canvas.width = width;
            canvas.height = height;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            // Remueve transparencias RGBA convirtiendo a JPEG plano con calidad 70%
            const dataURL = canvas.toDataURL('image/jpeg', 0.7);
            fotosBase64[tipo] = dataURL.split(',')[1];
            alertarAutoguardado();
        }
        img.src = e.target.result;
    }
    reader.readAsDataURL(file);
}

// FIX: Declarada correctamente como función asíncrona estándar
async function enviarFormulario(event) {
    event.preventDefault();
    const btn = document.getElementById("btnEnviar");
    btn.disabled = true;
    btn.innerText = "Sincronizando con Google...";

    const payload = {
        id_visita: document.getElementById("id_visita").value,
        tipo_instalacion: document.getElementById("tipo_instalacion").value,
        cliente: document.getElementById("cliente").value,
        direccion: document.getElementById("direccion").value,
        gps: document.getElementById("gps").value,
        tipo_cubierta: document.getElementById("tipo_cubierta").value,
        inclinacion: document.getElementById("inclinacion").value,
        tipo_red: document.getElementById("tipo_red").value,
        breaker_principal: document.getElementById("breaker_principal").value,
        fotos: [
            { nombre: "recibo.jpg", bytes: fotosBase64.recibo },
            { nombre: "tablero.jpg", bytes: fotosBase64.tablero },
            { nombre: "techo.jpg", bytes: fotosBase64.techo }
        ]
    };

    try {
        const response = await fetch(URL_APPS_SCRIPT, {
            method: 'POST',
            mode: 'no-cors', // Evita bloqueos de CORS en navegadores móviles
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        alert("¡Levantamiento guardado con éxito en Google!");
        localStorage.clear();
        window.location.reload();
    } catch (error) {
        alert("Error al enviar los datos: " + error);
        btn.disabled = false;
        btn.innerText = "🚀 Finalizar y Enviar a Google";
    }
}
    
    </script>
</body>
</html>
