<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarTSS - Diagnóstico de Red</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-md flex flex-col">
        <header class="bg-blue-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow">
            <h1 class="font-bold text-lg">SolarTSS ☀️ (MODO DIAGNÓSTICO)</h1>
        </header>
        
        <main class="p-4 flex-grow">
            <div id="loginSection" class="space-y-4 py-8">
                <h2 class="text-xl font-bold text-center text-blue-900">Acceso Técnico</h2>
                <input type="password" id="appPass" class="w-full border rounded p-3 text-center" placeholder="Introduce la contraseña técnica">
                <button onclick="verificarLogin()" class="w-full bg-blue-900 text-white font-bold p-3 rounded-lg">Entrar</button>
                <p id="loginError" class="text-red-500 text-sm text-center hidden">Contraseña incorrecta</p>
            </div>

            <form id="surveyForm" class="space-y-6 hidden" onsubmit="enviarFormulario(event)">
                <input type="hidden" id="id_visita" name="id_visita">

                <div>
                    <label class="block font-medium text-sm text-slate-700 mb-1">Tipo de Instalación</label>
                    <select id="tipo_instalacion" name="tipo_instalacion" class="w-full border rounded p-2 bg-slate-50">
                        <option value="Residencial">Residencial</option>
                    </select>
                </div>

                <div class="bg-slate-50 p-3 rounded-lg border space-y-4">
                    <h3 class="font-bold text-sm text-blue-900 uppercase">Información del Cliente</h3>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Nombre Completo</label>
                        <input type="text" id="cliente" class="w-full border rounded p-2" value="Test Diagnostico Real">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Dirección</label>
                        <input type="text" id="direccion" class="w-full border rounded p-2" value="Calle Falsa 123">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600 mb-1">Coordenadas GPS</label>
                        <input type="text" id="gps" class="w-full border rounded p-2" value="4.0, -74.0">
                    </div>
                </div>

                <div class="bg-slate-50 p-3 rounded-lg border space-y-4">
                    <h3 class="font-bold text-sm text-blue-900 uppercase">Registro Fotográfico de Prueba</h3>
                    <p class="text-xs text-slate-500">Para el diagnóstico, se enviará una imagen simulada ultraligera para descartar problemas de tamaño.</p>
                </div>

                <button type="submit" id="btnEnviar" class="w-full bg-amber-600 text-white font-bold p-3 rounded-lg shadow text-center">
                    ⚡ Lanzar Envío y Forzar Captura de Error
                </button>
            </form>
        </main>
    </div>

    <script>
const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbzU0-z7BY3wP1BUXZUS06JzL7gQ-ydpXmK-hZjWiXDQsrKZp8i7v6mv2HbepXTjHTBbqg/exec";
const PASS_CORRECTA = "ZuttaSolar2026*"; 

// String de 1 píxel para test rápido
const fotoSimulada = "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

function verificarLogin() {
    const pass = document.getElementById("appPass").value;
    if (pass === PASS_CORRECTA) {
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("surveyForm").classList.remove("hidden");
        document.getElementById("id_visita").value = "diag_" + Math.random().toString(36).substring(2, 7);
    } else {
        document.getElementById("loginError").classList.remove("hidden");
    }
}

async function enviarFormulario(event) {
    event.preventDefault();
    const btn = document.getElementById("btnEnviar");
    btn.disabled = true;
    btn.innerText = "Forzando conexión segura con Google...";

    const formData = new URLSearchParams();
    formData.append("id_visita", document.getElementById("id_visita").value);
    formData.append("tipo_instalacion", document.getElementById("tipo_instalacion").value);
    formData.append("cliente", document.getElementById("cliente").value);
    formData.append("direccion", document.getElementById("direccion").value);
    formData.append("gps", document.getElementById("gps").value);
    formData.append("tipo_cubierta", "Losa");
    formData.append("inclinacion", "10");
    formData.append("tipo_red", "Monofasica");
    formData.append("breaker_principal", "1x20A");
    
    formData.append("foto_recibo", fotoSimulada);
    formData.append("foto_tablero", fotoSimulada);
    formData.append("foto_techo", fotoSimulada);

    try {
        // FORZAMOS MODO CORS PARA PODER EXTRAER EL TEXTO DEL ERROR REAL
        const response = await fetch(URL_APPS_SCRIPT, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        });
        
        const textoRespuesta = await response.text();
        alert("--- RESPUESTA CRUDA DE GOOGLE ---\n\n" + textoRespuesta);
        
    } catch (error) {
        alert("❌ ERROR DE RED O COMPILACIÓN:\n\n" + error.message + "\n\nSi aparece un error de CORS aquí, el Apps Script no tiene la versión correcta activa.");
    } finally {
        btn.disabled = false;
        btn.innerText = "⚡ Lanzar Envío y Forzar Captura de Error";
    }
}
    </script>
</body>
</html>
